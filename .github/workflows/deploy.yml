name: Deploy to VPS

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  packages: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Login a GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Construir y publicar backend
        uses: docker/build-push-action@v5
        with:
          context: ./app/backend
          push: true
          tags: |
            ghcr.io/${{ secrets.GHCR_USERNAME }}/backend:latest
            ghcr.io/${{ secrets.GHCR_USERNAME }}/backend:${{ github.sha }}

      - name: Construir y publicar frontend
        uses: docker/build-push-action@v5
        with:
          context: ./app/frontend
          push: true
          tags: |
            ghcr.io/${{ secrets.GHCR_USERNAME }}/frontend:latest
            ghcr.io/${{ secrets.GHCR_USERNAME }}/frontend:${{ github.sha }}

      - name: Desplegar en el VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_SSH_PORT }}
          script: |
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ secrets.GHCR_USERNAME }} --password-stdin
            cd ~/docker-services
            docker pull ghcr.io/${{ secrets.GHCR_USERNAME }}/backend:latest
            docker pull ghcr.io/${{ secrets.GHCR_USERNAME }}/frontend:latest
            docker-compose down backend frontend || true
            docker-compose up -d backend frontend
            docker image prune -f