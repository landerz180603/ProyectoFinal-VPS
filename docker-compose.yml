networks:
  traefik-public:
    external: true

services:
  traefik:
    image: traefik:v2.11.0
    container_name: traefik
    restart: unless-stopped

    command:
      - "--configFile=/etc/traefik/traefik.yml"
      - "--log.level=DEBUG"

    ports:
      - "80:80"
      - "443:443"

    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./traefik/letsencrypt:/letsencrypt

    networks:
      - traefik-public

    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.traefik-dashboard.rule=Host(`traefikjr.byronrm.com`)"
      - "traefik.http.routers.traefik-dashboard.entrypoints=websecure"
      - "traefik.http.routers.traefik-dashboard.tls=true"
      - "traefik.http.routers.traefik-dashboard.tls.certresolver=letsencrypt"
      - "traefik.http.routers.traefik-dashboard.service=api@internal"
      - "traefik.docker.network=traefik-public"

  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    restart: unless-stopped

    command:
      - "-H"
      - "unix:///var/run/docker.sock"

    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./portainer/data:/data

    networks:
      - traefik-public

    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.portainer.rule=Host(`portainerjr.byronrm.com`)"
      - "traefik.http.routers.portainer.entrypoints=websecure"
      - "traefik.http.routers.portainer.tls=true"
      - "traefik.http.routers.portainer.tls.certresolver=letsencrypt"
      - "traefik.http.services.portainer.loadbalancer.server.port=9000"
      - "traefik.docker.network=traefik-public"

  postgres:
    image: postgres:16-alpine
    container_name: postgres
    restart: unless-stopped

    environment:
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: apppass
      POSTGRES_DB: appdb

    volumes:
      - ./postgres/data:/var/lib/postgresql/data

    networks:
      - traefik-public

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U appuser -d appdb"]
      interval: 10s
      timeout: 5s
      retries: 10

  adminer:
    image: adminer:latest
    container_name: adminer
    restart: unless-stopped

    networks:
      - traefik-public

    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.adminer.rule=Host(`dbyugsi.byronrm.com`)"
      - "traefik.http.routers.adminer.entrypoints=websecure"
      - "traefik.http.routers.adminer.tls=true"
      - "traefik.http.routers.adminer.tls.certresolver=letsencrypt"
      - "traefik.http.services.adminer.loadbalancer.server.port=8080"
      - "traefik.docker.network=traefik-public"

  backend:
    image: ghcr.io/landerz180603/backend:latest
    container_name: backend
    restart: unless-stopped

    environment:
      DB_USER: appuser
      DB_PASS: apppass
      DB_NAME: appdb
      DB_HOST: postgres
      PORT: 5000

    networks:
      - traefik-public

    depends_on:
      postgres:
        condition: service_healthy

    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.backend.rule=Host(`backjr.byronrm.com`)"
      - "traefik.http.routers.backend.entrypoints=websecure"
      - "traefik.http.routers.backend.tls=true"
      - "traefik.http.routers.backend.tls.certresolver=letsencrypt"
      - "traefik.http.services.backend.loadbalancer.server.port=5000"
      - "traefik.docker.network=traefik-public"

  frontend:
    image: ghcr.io/landerz180603/frontend:latest
    container_name: frontend
    restart: unless-stopped

    networks:
      - traefik-public

    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=Host(`jorge.byronrm.com`)"
      - "traefik.http.routers.frontend.entrypoints=websecure"
      - "traefik.http.routers.frontend.tls=true"
      - "traefik.http.routers.frontend.tls.certresolver=letsencrypt"
      - "traefik.http.services.frontend.loadbalancer.server.port=80"
      - "traefik.docker.network=traefik-public"