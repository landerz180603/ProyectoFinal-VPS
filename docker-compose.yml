version: '3.8'  

networks:
  traefik-public:
    external: true

services:
  traefik:
    image: traefik:latest
    container_name: traefik
    restart: unless-stopped
    command:
      - "--configFile=/etc/traefik/traefik.yml"
      - "--log.level=DEBUG"  
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./traefik/letsencrypt:/letsencrypt
    networks:
      - traefik-public
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dashboard.rule=Host(`portainerjr.byronrm.com`) && (PathPrefix(`/api`) || PathPrefix(`/dashboard`))"
      - "traefik.http.routers.dashboard.service=api@internal"
      # (Opcional) autenticación para el dashboard
      # - "traefik.http.routers.dashboard.middlewares=auth"
      # - "traefik.http.middlewares.auth.basicauth.users=admin:$$2y$$10$$..."

  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    restart: unless-stopped
    command: -H unix:///var/run/docker.sock
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./portainer/data:/data
    networks:
      - traefik-public
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.portainer.rule=Host(`portainerjr.byronrm.com`)"
      - "traefik.http.services.portainer.loadbalancer.server.port=9000"

  postgres:
    image: postgres:16-alpine
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: apppass
      POSTGRES_DB: appdb
    volumes:
      - ./postgres/data:/var/lib/postgresql/data
    networks:
      - traefik-public

  adminer:
    image: adminer:latest
    container_name: adminer
    restart: unless-stopped
    networks:
      - traefik-public
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.adminer.rule=Host(`dbyugsi.byronrm.com`)"
      - "traefik.http.services.adminer.loadbalancer.server.port=8080"

  backend:
    image: ghcr.io/landerz180603/backend:latest   
    container_name: backend
    restart: unless-stopped
    environment:
      - DB_USER=appuser
      - DB_PASS=apppass
      - DB_NAME=appdb
      - DB_HOST=postgres
      - PORT=5000
    networks:
      - traefik-public
    depends_on:
      - postgres
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.backend.rule=Host(`backjr.byronrm.com`)"
      - "traefik.http.services.backend.loadbalancer.server.port=5000"
      - "traefik.docker.network=traefik-public"   

  frontend:
    image: ghcr.io/landerz180603/frontend:latest  
    container_name: frontend
    restart: unless-stopped
    environment:
      - REACT_APP_API_URL=https://backjr.byronrm.com   
    networks:
      - traefik-public
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=Host(`jorge.byronrm.com`)"
      - "traefik.http.services.frontend.loadbalancer.server.port=80"
      - "traefik.docker.network=traefik-public"  